name: Rakenna iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # Päivitetty v4

      - name: Setup Node
        uses: actions/setup-node@v4 # Päivitetty v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Create config.js
        run: |
          echo "const CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > config.js

      - name: Initialize Capacitor
        run: |
          npx cap init Lounas fi.nuutti.lounas --web-dir .
          npx cap add ios

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA (Payload folder method)
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r Lounas.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4 # Päivitetty v4
        with:
          name: Lounas-Sideload-Version
          path: Lounas.ipa
