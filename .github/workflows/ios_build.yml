name: Rakenna iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/ios

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          # Luodaan API-konfiguraatio suoraan www-kansioon
          echo "const CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > www/config.js
          cp index.html www/
          cp menu.json www/
          cp kr-logo.png www/

      - name: Initialize Capacitor
        run: |
          # Asetetaan sovelluksen nimeksi välilyönnillä varustettu KR TRACKER
          npx cap init "KR TRACKER" fi.nuutti.lounas --web-dir www
          npx cap add ios

      - name: Capacitor Sync
        run: npx cap sync ios

      # UX-KORJAUS: Asetetaan sovelluskuvakkeet manuaalisesti kopioimalla
      - name: Set App Icon Manually
        run: |
          mkdir -p ios/App/App/Assets.xcassets/AppIcon.appiconset
          # Kopioidaan kr-logo.png kaikkiin Xcode-projektin vaatimiin ikonikokoihin
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-20@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-20@3x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-29@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-29@3x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-40@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-40@3x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-60@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-60@3x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-76.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-76@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-83.5@2x.png
          cp kr-logo.png ios/App/App/Assets.xcassets/AppIcon.appiconset/icon-1024.png

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          # Pakataan lopullinen IPA-tiedosto
          zip -r KR-TRACKER.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          # Nimi, joka näkyy GitHubin Actions-listauksessa
          name: "KR TRACKER iOS Build"
          path: KR-TRACKER.ipa
