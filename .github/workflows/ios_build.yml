name: Rakenna iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/ios @capacitor/assets

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          echo "const CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > www/config.js
          cp index.html www/
          cp menu.json www/
          cp kr-logo.png www/
          # Kopioidaan logo assets-kansioon kuvakkeiden generointia varten
          mkdir -p assets
          cp kr-logo.png assets/icon-only.png

      - name: Initialize Capacitor
        run: |
          # Nimi muutettu muotoon "KR TRACKER"
          npx cap init "KR TRACKER" fi.nuutti.lounas --web-dir www
          npx cap add ios

      - name: Generate App Icons
        run: |
          # Yritetään generoida kuvakkeet automaattisesti
          npx capacitor-assets generate --ios --icon-only assets/icon-only.png

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          # Tiedostonimi välilyönnillä voi olla haastava, käytetään viivaa tiedostossa
          zip -r KR-TRACKER.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact-nimi välilyönnillä
          name: "KR TRACKER iOS Build"
          path: KR-TRACKER.ipa
