name: Päivitä ruokalista

on:
  schedule:
    # Ajaa päivityksen joka aamu klo 05:00 UTC (n. klo 07:00 Suomen aikaa)
    - cron: '0 5 * * *'
  workflow_dispatch: # Mahdollistaa manuaalisen käynnistyksen Actions-välilehdeltä
  push:
    branches:
      - main # Ajaa päivityksen aina, kun muokkaat index.html-tiedostoa

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Hae ruokalistan data
        run: |
          DATE=$(date +%Y-%m-%d)
          URL="https://api.fi.poweresta.com/publicmenu/dates/muhosutajarvivaala/muhoskoulut/?menu=ruokalista&dates=$DATE"
          curl -o menu.json "$URL"

      - name: Luo konfiguraatio (config.js)
        run: |
          # Tämä vaihe luo tiedoston, jota index.html tarvitsee AI-toimintoihin
          echo "const CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > config.js

      - name: Commit ja Push muutokset
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add menu.json config.js
          # Commit epäonnistuu, jos mikään ei ole muuttunut, siksi "|| exit 0"
          git commit -m "Robotti päivitti ruokalistan ja API-konfiguraation" || exit 0
          git push
