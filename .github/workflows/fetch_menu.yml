name: Päivitä ruokalista

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Hae ruokalistan data
        run: |
          node scripts/fetch_menus.js

      - name: Luo väliaikainen konfiguraatio
        run: |
          B64_KEY=$(echo -n "${{ secrets.GEMINI_API_KEY }}" | base64 -w 0)
          echo "const CONFIG = { API_KEY: atob('$B64_KEY') };" > config.js
          sed -i '/config.js/d' .gitignore

      - name: Julkaise GitHub Pagesiin
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Julkaisee koko kansion sisältäen väliaikaisen config.js:n
          branch: gh-pages # Julkaisee tiedostot tähän haaraan
