name: Päivitä ruokalista
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Hae data
        run: |
          DATE=$(date +%Y-%m-%d)
          URL="https://api.fi.poweresta.com/publicmenu/dates/muhosutajarvivaala/muhoskoulut/?menu=ruokalista&dates=$DATE"
          curl -o menu.json "$URL"

      # TÄMÄ VAIHE PUUTTUI TAI OLI VIRHEELLINEN:
      - name: Luo config.js
        run: |
          echo "const CONFIG = { API_KEY: '${{ secrets.GEMINI_API_KEY }}' };" > config.js

      - name: Commit ja Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add menu.json config.js
          git commit -m "Robotti päivitti datat" || exit 0
          git push
