<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lounas</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1C1C1E; --card-sec: #2C2C2E; --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B; --text: #FFFFFF; --text-dim: #8E8E93;
            --font-main: "Manrope", sans-serif;
        }

        html, body {
            width: 100%; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; font-family: var(--font-main);
            -webkit-font-smoothing: antialiased; overflow-x: hidden;
        }

        /* SILOITETTU STICKY HEADER */
        header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 60px 20px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .header-content { max-width: 374px; margin: 0 auto; position: relative; }
        .date { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        /* MINI STATS - KORJATTU SIJAINTI */
        .sticky-stats {
            position: absolute; right: 0; bottom: 0;
            display: flex; gap: 12px; opacity: 0;
            transform: translateY(5px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .sticky-stats.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .s-val { font-size: 14px; font-weight: 800; display: block; line-height: 1; }
        .s-lbl { font-size: 8px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 2px; }

        .container { width: 100%; max-width: 414px; padding: 20px; margin: 0 auto; box-sizing: border-box; }

        /* HERO - MAKROT KORJATTU */
        .hero {
            background: linear-gradient(145deg, #1c1c1e, #131314);
            border-radius: 28px; padding: 35px 20px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .plate-circle {
            width: 140px; height: 140px; border-radius: 50%;
            border: 6px solid var(--card-sec); margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
        }

        .kcal-val { font-size: 48px; font-weight: 800; letter-spacing: -1px; }
        
        /* Makrotekstien asettelu korjattu */
        .macro-row { 
            display: flex; justify-content: space-around; 
            margin-top: 25px; padding-top: 25px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .m-box { flex: 1; }
        .m-val { font-size: 19px; font-weight: 700; display: block; }
        .m-lbl { font-size: 9px; font-weight: 800; color: var(--text-dim); margin-bottom: 5px; letter-spacing: 0.5px; }

        /* AI SYÖTTÖ */
        .ai-zone { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 25px; }
        textarea { 
            width: 100%; background: transparent; border: none; color: white; 
            font-size: 17px; font-family: inherit; outline: none; resize: none; 
            min-height: 80px; line-height: 1.5; overflow: hidden;
        }

        .btn-row { display: flex; gap: 12px; margin-top: 15px; }
        .btn-upload { background: #2C2C2E; color: var(--accent); flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 15px; }
        .btn-analyze { background: var(--accent); color: white; flex: 2; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 15px; }

        /* RUOKAKORTIT */
        .food-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .food-name { font-size: 18px; font-weight: 700; display: block; margin-bottom: 15px; }

        .input-wrapper { position: relative; display: flex; align-items: center; background: #000; border-radius: 14px; }
        input[type="number"] { 
            flex: 1; background: transparent; border: none; color: white; 
            font-weight: 700; font-size: 24px; font-family: inherit; 
            padding: 14px 45px 14px 18px; outline: none;
        }
        .input-suffix { position: absolute; right: 18px; color: var(--text-dim); font-weight: 700; font-size: 18px; }

        #splash { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="splash"><div style="font-weight: 800; color: white; font-size: 20px; letter-spacing: 1px;">ANALYSOIDAAN</div></div>

<header id="main-header">
    <div class="header-content">
        <div class="date" id="date-label">MUHOS SCHOOLS</div>
        <h1>Lounas</h1>
        <div class="sticky-stats" id="mini-stats">
            <div class="s-item"><span class="s-lbl">KCAL</span><span class="s-val" id="mini-kcal">0</span></div>
            <div class="s-item"><span class="s-lbl" style="color:var(--p)">P</span><span class="s-val" id="mini-p">0g</span></div>
            <div class="s-item"><span class="s-lbl" style="color:var(--f)">R</span><span class="s-val" id="mini-r">0g</span></div>
            <div class="s-item"><span class="s-lbl" style="color:var(--c)">H</span><span class="s-val" id="mini-h">0g</span></div>
        </div>
    </div>
</header>

<div class="container">
    <div class="hero" id="hero-section">
        <div class="plate-circle">
            <div>
                <span class="kcal-val" id="res-kcal">0</span>
                <div style="color: var(--text-dim); font-size: 14px; font-weight: 700;">kcal</div>
            </div>
        </div>
        <div class="macro-row">
            <div class="m-box"><span class="m-lbl" style="color:var(--p)">PROTEIINI</span><span class="m-val" id="res-p">0g</span></div>
            <div class="m-box"><span class="m-lbl" style="color:var(--f)">RASVA</span><span class="m-val" id="res-r">0g</span></div>
            <div class="m-box"><span class="m-lbl" style="color:var(--c)">HIILIHYDRAATTI</span><span class="m-val" id="res-h">0g</span></div>
        </div>
    </div>

    <div class="ai-zone">
        <textarea id="ai-input" oninput="autoExpand(this)" placeholder="Mitä söit tänään?"></textarea>
        <div class="btn-row">
            <button class="btn-upload" onclick="document.getElementById('camera-input').click()">Lisää kuva</button>
            <button class="btn-analyze" onclick="runAI()">Analysoi</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" style="display:none" onchange="handleFile(this)">
    </div>

    <div id="food-list"></div>
    <div id="extra-food-list"></div>
</div>

<script>
    const GEMINI_API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : "";
    let mealData = [];
    let extraData = [];
    let selectedImageData = null;

    // SCROLL EFEKTI - SILOITETTU
    window.addEventListener('scroll', () => {
        const trigger = 100;
        const miniStats = document.getElementById('mini-stats');
        const header = document.getElementById('main-header');
        
        if (window.scrollY > trigger) {
            miniStats.classList.add('visible');
            header.style.padding = '45px 20px 15px';
        } else {
            miniStats.classList.remove('visible');
            header.style.padding = '60px 20px 20px';
        }
    });

    function autoExpand(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    async function init() {
        try {
            const r = await fetch('./menu.json');
            const data = await r.json();
            const rows = data[0].data.mealOptions[0].rows;
            const container = document.getElementById('food-list');

            rows.forEach((row, i) => {
                const factors = row.nutritiveItem.factors;
                const getVal = (lbl, isK) => {
                    const f = factors.find(fact => fact.nutritiveFactorNames[0].name === (isK ? "Energia" : lbl) && (!isK || fact.values[0].value100.includes("kcal")));
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0;
                };
                const item = { name: row.names[0].name, kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva") };
                mealData.push(item);
                container.innerHTML += `
                    <div class="food-card">
                        <span class="food-name">${item.name}</span>
                        <div class="input-wrapper"><input type="number" id="q-${i}" value="0" oninput="calc()"><span class="input-suffix">g</span></div>
                    </div>`;
            });
        } catch (e) { console.error("Menu failed"); }
    }

    async function runAI() {
        if (!GEMINI_API_KEY) return alert("AI Avain puuttuu edelleen! Tarkista GitHub Action.");
        document.getElementById('splash').style.display = 'flex';

        let prompt = `Menu: ${JSON.stringify(mealData.map(m=>m.name))}. Tunnista annos grammoina. Palauta vain JSON: {"menuResults": {"Ruoka": g}, "extraItems": []}`;
        let body = { contents: [{ parts: [{ text: prompt + ` Kuvaus: "${document.getElementById('ai-input').value}"` }] }] };

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const d = await resp.json();
            const results = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
            mealData.forEach((item, i) => { document.getElementById(`q-${i}`).value = results.menuResults[item.name] || 0; });
            calc();
        } catch (e) { console.error(e); }
        document.getElementById('splash').style.display = 'none';
    }

    function calc() {
        let tk=0, tp=0, th=0, tr=0;
        mealData.forEach((item, i) => {
            const w = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        const set = (id, val) => document.getElementById(id).innerText = val;
        set('res-kcal', Math.round(tk)); set('mini-kcal', Math.round(tk));
        set('res-p', Math.round(tp) + "g"); set('mini-p', Math.round(tp) + "g");
        set('res-r', Math.round(tr) + "g"); set('mini-r', Math.round(tr) + "g");
        set('res-h', Math.round(th) + "g"); set('mini-h', Math.round(th) + "g");
    }

    const d = new Date();
    document.getElementById('date-label').innerText = d.toLocaleDateString('fi-FI', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
    init();
</script>
</body>
</html>
