<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lounas Dashboard</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1C1C1E;
            --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B;
            --text: #FFFFFF;
            --radius: 22px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px; -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 414px; margin: 0 auto; }

        header { margin: 20px 0 25px 0; }
        .date { font-size: 13px; font-weight: 600; color: #8E8E93; text-transform: uppercase; }
        h1 { font-size: 32px; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }

        /* Summary Dashboard */
        .summary-card {
            background: linear-gradient(180deg, #1C1C1E 0%, #131314 100%);
            border-radius: var(--radius); padding: 30px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .kcal-val { font-size: 64px; font-weight: 800; line-height: 1; display: block; }
        .kcal-unit { font-size: 17px; font-weight: 600; color: #8E8E93; }

        .macro-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            margin-top: 25px; padding-top: 20px; border-top: 1px solid #2C2C2E;
        }
        .macro-box { display: flex; flex-direction: column; }
        .m-lab { font-size: 11px; font-weight: 700; color: #8E8E93; margin-bottom: 4px; }
        .m-val { font-size: 18px; font-weight: 700; }

        /* AI Input */
        .ai-card {
            background: var(--card); border-radius: var(--radius);
            padding: 15px; margin-bottom: 30px;
        }
        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 17px; padding: 10px; outline: none; resize: none; font-family: inherit;
        }
        .ai-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 14px; border: none;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-gray { background: #2C2C2E; color: white; }
        .btn-blue { background: var(--accent); color: white; }

        /* Food Rows */
        .food-item {
            background: var(--card); border-radius: 20px;
            padding: 18px; margin-bottom: 12px;
        }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .food-name { font-weight: 700; font-size: 17px; }
        .food-g { font-weight: 700; color: var(--accent); font-size: 14px; }
        .input-row { display: flex; gap: 10px; }
        input {
            flex: 1; background: var(--bg); border: none; padding: 12px;
            border-radius: 12px; color: white; font-size: 18px; font-weight: 700; text-align: center;
        }
        select {
            flex: 1.5; background: var(--bg); border: none; padding: 12px;
            border-radius: 12px; color: var(--accent); font-size: 14px; font-weight: 700;
        }

        /* Loading Overlay & Spinner */
        #loader-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .loader-text { margin-top: 25px; font-weight: 700; font-size: 18px; color: white; }
        
        .loader {
          width: 48px; height: 48px; border: 5px solid var(--accent); border-radius: 50%;
          display: inline-block; box-sizing: border-box; position: relative;
          animation: pulse 1s linear infinite;
        }
        .loader:after {
          content: ''; position: absolute; width: 48px; height: 48px;
          border: 5px solid var(--accent); border-radius: 50%; display: inline-block;
          box-sizing: border-box; left: 50%; top: 50%; transform: translate(-50%, -50%);
          animation: scaleUp 1s linear infinite;
        }

        @keyframes scaleUp { 0% { transform: translate(-50%, -50%) scale(0) } 60% , 100% { transform: translate(-50%, -50%)  scale(1)} }
        @keyframes pulse { 0% , 60% , 100%{ transform:  scale(1) } 80% { transform:  scale(1.2)} }
    </style>
</head>
<body>

<div id="loader-overlay">
    <span class="loader"></span>
    <div class="loader-text">Analysoidaan...</div>
</div>

<div class="container">
    <header>
        <div class="date" id="date-label">TIISTAI, 24. HELMIKUUTA</div>
        <h1>Dashboard</h1>
    </header>

    <div class="summary-card">
        <span class="kcal-val" id="res-kcal">0</span>
        <span class="kcal-unit">kcal consumed</span>
        <div class="macro-row">
            <div class="macro-box"><span class="m-lab">PROTEIN</span><span class="m-val" style="color:var(--p)" id="res-p">0g</span></div>
            <div class="macro-box"><span class="m-lab">FATS</span><span class="m-val" style="color:var(--f)" id="res-r">0g</span></div>
            <div class="macro-box"><span class="m-lab">CARBS</span><span class="m-val" style="color:var(--c)" id="res-h">0g</span></div>
        </div>
    </div>

    <div class="ai-card">
        <textarea id="ai-text" rows="2" placeholder="Kuvaile ateria tai ota kuva..."></textarea>
        <div class="ai-btns">
            <input type="file" id="cam" accept="image/*" capture="camera" style="display:none" onchange="preview(this)">
            <button class="btn btn-gray" onclick="document.getElementById('cam').click()">📷 Kamera</button>
            <button class="btn btn-blue" onclick="runAI()">✨ Analysoi</button>
        </div>
    </div>

    <div id="food-list"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwB37fMh6wTQFjcCkLXeiDs7gilszXggMPHEsud7R2qSVgzrt7w7DEls_c53531m7_Z0A/exec";
    
    let mealData = [];
    let imgBase64 = null;
    const UNITS = { "130": 130, "dl": 100, "1": 1, "60": 60 };

    async function init() {
        try {
            const resp = await fetch(GAS_URL);
            const json = await resp.json();
            const rows = json[0].data.mealOptions[0].rows; //
            const container = document.getElementById('food-list');
            
            rows.forEach((row, i) => {
                const factors = (row.nutritiveItem && row.nutritiveItem.factors) ? row.nutritiveItem.factors : []; //
                const getVal = (n, isKcal=false) => {
                    const f = factors.find(fact => {
                        const fn = fact.nutritiveFactorNames[0].name;
                        return isKcal ? (fn === "Energia" && fact.values[0].value100.includes("kcal")) : (fn === n);
                    });
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0; //
                };

                const item = { 
                    name: row.names[0].name, 
                    kcal: getVal("Energia", true), 
                    p: getVal("Proteiini"), 
                    h: getVal("Hiilihydraatit"), 
                    r: getVal("Rasva"), 
                    dl: row.names[0].name.toLowerCase().includes("pasta") ? 65 : 100 
                };
                mealData.push(item);

                container.innerHTML += `
                    <div class="food-item">
                        <div class="food-header"><span class="food-name">${item.name}</span><span class="food-g" id="g-${i}">0 g</span></div>
                        <div class="input-row">
                            <input type="number" id="q-${i}" value="0" oninput="calc()">
                            <select id="u-${i}" onchange="calc()">
                                <option value="130">Kauha</option><option value="dl">Desi</option><option value="1">Gramma</option><option value="60">Kpl</option>
                            </select>
                        </div>
                    </div>`;
            });
            updateDate();
        } catch (e) { document.getElementById('date-label').innerText = "YHTEYSVIRHE"; }
    }

    function preview(input) {
        const reader = new FileReader();
        reader.onload = (e) => imgBase64 = e.target.result.split(',')[1];
        reader.readAsDataURL(input.files[0]);
    }

    async function runAI() {
        document.getElementById('loader-overlay').style.display = 'flex';
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "analyze",
                    text: document.getElementById('ai-text').value,
                    image: imgBase64,
                    menu: mealData.map(m => m.name).join(", ")
                })
            });
            const weights = await response.json();
            mealData.forEach((item, i) => {
                if (weights[item.name]) {
                    document.getElementById(`q-${i}`).value = weights[item.name];
                    document.getElementById(`u-${i}`).value = "1";
                }
            });
            calc();
        } catch (e) { alert("Analyysi epäonnistui. Varmista, että Google Script on deployed as 'Anyone'."); }
        document.getElementById('loader-overlay').style.display = 'none';
    }

    function calc() {
        let tk = 0, tp = 0, th = 0, tr = 0;
        mealData.forEach((item, i) => {
            const q = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            const u = document.getElementById(`u-${i}`).value;
            const w = (u === "dl") ? q * item.dl : q * parseFloat(u);
            document.getElementById(`g-${i}`).innerText = Math.round(w) + " g";
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        document.getElementById('res-kcal').innerText = Math.round(tk);
        document.getElementById('res-p').innerText = Math.round(tp) + "g";
        document.getElementById('res-h').innerText = Math.round(th) + "g";
        document.getElementById('res-r').innerText = Math.round(tr) + "g";
    }

    function updateDate() {
        const d = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date-label').innerText = d.toLocaleDateString('fi-FI', options).toUpperCase();
    }

    init();
</script>
</body>
</html>
