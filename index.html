<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lounas Dashboard</title>
    <style>
        :root {
            --bg: #000000; --card: #1C1C1E; --card-sec: #2C2C2E; --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B; --text: #FFFFFF; --text-dim: #8E8E93;
            --radius: 22px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 414px; padding: 20px; margin: 0 auto; box-sizing: border-box; }

        header { margin: 40px 0 25px 5px; }
        .date { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        .hero {
            background: linear-gradient(145deg, #1c1c1e, #131314);
            border-radius: var(--radius); padding: 30px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .kcal-val { font-size: 64px; font-weight: 800; line-height: 1; display: block; }
        .kcal-label { font-size: 17px; font-weight: 600; color: var(--text-dim); margin-top: 5px; }

        .macro-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--card-sec);
        }

        .m-box { display: flex; flex-direction: column; align-items: center; }
        .m-label { font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 4px; }
        .m-val { font-size: 18px; font-weight: 700; }

        .ai-zone { background: var(--card); border-radius: var(--radius); padding: 15px; margin-bottom: 25px; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; padding: 5px; box-sizing: border-box; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-sec { background: #2C2C2E; color: white; }
        .btn-pri { background: var(--accent); color: white; }

        .food-card { background-color: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.02); }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .food-name { font-size: 17px; font-weight: 700; }
        .food-g { font-size: 13px; font-weight: 700; color: var(--accent); background: rgba(10, 132, 255, 0.1); padding: 4px 10px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: none; padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: 700; font-size: 18px; outline: none; }
        select { flex: 1.5; background: #000; border: none; padding: 12px; border-radius: 10px; color: var(--accent); font-weight: 700; appearance: none; text-align: center; }

        #splash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; }
    </style>
</head>
<body>

<div id="splash"><div style="font-weight: 800; letter-spacing: 2px; color: white;">SYNCING...</div></div>

<div class="container">
    <header>
        <div class="date" id="date-label">MUHOS SCHOOLS</div>
        <h1>Dashboard</h1>
    </header>

    <div class="hero">
        <span class="kcal-val" id="res-kcal">0</span>
        <div class="kcal-label">kcal consumed</div>
        <div class="macro-row">
            <div class="m-box"><span class="m-label">PROTEIN</span><span class="m-val" style="color: var(--p)" id="res-p">0g</span></div>
            <div class="m-box"><span class="m-label">FATS</span><span class="m-val" style="color: var(--f)" id="res-r">0g</span></div>
            <div class="m-box"><span class="m-label">CARBS</span><span class="m-val" style="color: var(--c)" id="res-h">0g</span></div>
        </div>
    </div>

    <div class="ai-zone">
        <textarea id="ai-input" rows="2" placeholder="Kuvaile annoksesi... (esim. 'kaksi kauhallista lihakeittoa')"></textarea>
        <div class="btn-row">
            <button class="btn btn-sec" onclick="alert('Kamera-analyysi tulossa pian!')">📷 Camera</button>
            <button class="btn btn-pri" onclick="runAI()">✨ Analyze</button>
        </div>
    </div>

    <div id="food-list"></div>
</div>

<script>
    const GEMINI_API_KEY = "AIzaSyDBxIHsj1chijnARGj5oh_W8swKbGnEsSo";
    let mealData = [];
    const UNITS = { "kauha": 130, "dl": 100, "kpl": 60, "g": 1 };

    async function init() {
        try {
            // Lukee tiedoston, jonka GitHub Action päivittää aamuisin
            const r = await fetch('./menu.json');
            if (!r.ok) throw new Error("Menu data missing");
            const data = await r.json();
            
            const rows = data[0].data.mealOptions[0].rows;
            const container = document.getElementById('food-list');

            rows.forEach((row, i) => {
                const factors = row.nutritiveItem.factors;
                const getVal = (lbl, isK) => {
                    const f = factors.find(fact => {
                        const name = fact.nutritiveFactorNames[0].name;
                        return isK ? (name === "Energia" && fact.values[0].value100.includes("kcal")) : (name === lbl);
                    });
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0;
                };

                const item = {
                    name: row.names[0].name,
                    kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva"),
                    density: row.names[0].name.toLowerCase().includes("pasta") ? 65 : 100
                };
                mealData.push(item);

                container.innerHTML += `
                    <div class="food-card">
                        <div class="food-header"><span>${item.name}</span><span class="food-g" id="w-${i}">0 g</span></div>
                        <div class="controls">
                            <input type="number" id="q-${i}" value="0" oninput="calc()">
                            <select id="u-${i}" onchange="calc()">
                                <option value="kauha">Kauha</option><option value="dl">Desi</option>
                                <option value="kpl">Kpl</option><option value="g">Gram</option>
                            </select>
                        </div>
                    </div>`;
            });
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').style.display = 'none', 500);
        } catch (e) {
            document.getElementById('splash').innerHTML = "<div style='text-align:center; padding: 20px;'><h3>SYNC ERROR</h3><p>Run 'Päivitä ruokalista' Action in GitHub.</p></div>";
        }
    }

    async function runAI() {
        const text = document.getElementById('ai-input').value;
        if (!text) return alert("Kirjoita kuvaus ensin!");
        
        const loader = document.getElementById('splash');
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        loader.innerHTML = "<div style='color:white; font-weight:800;'>AI IS ANALYZING...</div>";

        // KORJATTU URL ja MALLI
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`;

        const prompt = `Päivän menu: ${JSON.stringify(mealData.map(m=>m.name))}. Käyttäjä sanoo: "${text}". Arvioi annoskoot grammoina. Palauta VAIN JSON-objekti: {"RuoanNimi": grammamäärä}. Käytä täsmälleen listan nimiä.`;

        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            if (!resp.ok) throw new Error("API Connection Failed");

            const d = await resp.json();
            const aiText = d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
            const results = JSON.parse(aiText);
            
            mealData.forEach((item, i) => {
                if (results[item.name]) {
                    document.getElementById(`q-${i}`).value = results[item.name];
                    document.getElementById(`u-${i}`).value = "g";
                }
            });
            calc();
        } catch (e) { 
            console.error(e);
            alert("AI Error. Check console for details."); 
        }
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
    }

    function calc() {
        let tk=0, tp=0, th=0, tr=0;
        mealData.forEach((item, i) => {
            const q = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            const u = document.getElementById(`u-${i}`).value;
            let w = (u === "dl") ? q * item.density : (u === "g" ? q : UNITS[u] * q);
            document.getElementById(`w-${i}`).innerText = Math.round(w) + " g";
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        document.getElementById('res-kcal').innerText = Math.round(tk);
        document.getElementById('res-p').innerText = Math.round(tp) + "g";
        document.getElementById('res-h').innerText = Math.round(th) + "g";
        document.getElementById('res-r').innerText = Math.round(tr) + "g";
    }

    const d = new Date();
    document.getElementById('date-label').innerText = d.toLocaleDateString('fi-FI', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

    init();
</script>
</body>
</html>
