<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lounas</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1C1C1E; --card-sec: #2C2C2E; --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B; --text: #FFFFFF; --text-dim: #8E8E93;
            --font-main: "Manrope", sans-serif;
        }

        html, body {
            overflow: hidden; width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; height: 100%; overflow-y: auto; 
            max-width: 414px; padding: 20px; margin: 0 auto; box-sizing: border-box; 
        }

        header { margin: 30px 0 20px 5px; }
        .date { font-size: 13px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        h1 { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        .hero {
            background: linear-gradient(145deg, #1c1c1e, #131314);
            border-radius: 24px; padding: 30px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        .plate-circle {
            width: 150px; height: 150px; border-radius: 50%;
            border: 6px solid var(--card-sec); margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .kcal-val { font-size: 40px; font-weight: 800; line-height: 1; display: block; }
        
        .macro-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--card-sec); }
        .m-val { font-size: 18px; font-weight: 700; }
        .m-lbl { font-size: 10px; font-weight: 800; color: var(--text-dim); margin-bottom: 4px; }

        .ai-zone { background: var(--card); border-radius: 20px; padding: 16px; margin-bottom: 25px; }
        
        textarea { 
            width: 100%; background: transparent; border: none; color: white; 
            font-size: 16px; font-family: inherit; outline: none; resize: none; 
            min-height: 100px; line-height: 1.5; overflow: hidden;
        }

        .btn-row { display: flex; gap: 12px; margin-top: 10px; }
        .btn-upload { background: #2C2C2E; color: var(--accent); flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 700; }
        .btn-analyze { background: var(--accent); color: white; flex: 2; padding: 16px; border-radius: 14px; border: none; font-weight: 700; }

        .food-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .food-name { font-size: 18px; font-weight: 700; margin-bottom: 12px; display: block; }

        .input-wrapper { position: relative; display: flex; align-items: center; background: #000; border-radius: 12px; }
        
        input[type="number"] { 
            flex: 1; background: transparent; border: none; color: white; 
            font-weight: 700; font-size: 30px; font-family: inherit; 
            padding: 12px 45px 12px 15px; outline: none;
            -webkit-appearance: none; margin: 0;
        }
        /* Poistetaan nuolet */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .input-suffix { position: absolute; right: 15px; color: var(--text-dim); font-weight: 700; font-size: 20px; pointer-events: none; }

        #splash { position: fixed; inset: 0; background: black; display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0.9; }
    </style>
</head>
<body>

<div id="splash"><div style="font-weight: 800; color: white; font-size: 20px;">ANALYSOIDAAN</div></div>

<div class="container">
    <header>
        <div class="date" id="date-label">MUHOS SCHOOLS</div>
        <h1>Lounas</h1>
    </header>

    <div class="hero">
        <div class="plate-circle">
            <div>
                <span class="kcal-val" id="res-kcal">0</span>
                <div style="color: var(--text-dim); font-size: 14px; font-weight: 700;">kcal</div>
            </div>
        </div>
        <div class="macro-row">
            <div class="m-box"><span class="m-lbl" style="color:var(--p)">PROTEIINI</span><span class="m-val" id="res-p">0g</span></div>
            <div class="m-box"><span class="m-lbl" style="color:var(--f)">RASVA</span><span class="m-val" id="res-r">0g</span></div>
            <div class="m-box"><span class="m-lbl" style="color:var(--c)">HIILIHYDRAATTI</span><span class="m-val" id="res-h">0g</span></div>
        </div>
    </div>

    <div class="ai-zone">
        <textarea id="ai-input" placeholder="Kuvaile, mitä söit tänään. (esim. 2 keskikokoista kauhaa lihakeittoa, kourallinen porkkanoita, sämpylä...)"></textarea>
        <div class="btn-row">
            <button class="btn-upload" onclick="document.getElementById('camera-input').click()">Lisää kuva</button>
            <button class="btn-analyze" onclick="runAI()">Analysoi</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" style="display:none" onchange="handleFile(this)">
    </div>

    <div id="food-list"></div>
    <div id="extra-food-list"></div>
</div>

<script>
    const GEMINI_API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : "";
    let mealData = [];
    let extraData = [];
    let selectedImageData = null;

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => { selectedImageData = e.target.result.split(',')[1]; };
            reader.readAsDataURL(file);
        }
    }

    async function init() {
        try {
            const r = await fetch('./menu.json');
            const data = await r.json();
            const rows = data[0].data.mealOptions[0].rows;
            const container = document.getElementById('food-list');

            rows.forEach((row, i) => {
                const factors = row.nutritiveItem.factors;
                const getVal = (lbl, isK) => {
                    const f = factors.find(fact => fact.nutritiveFactorNames[0].name === (isK ? "Energia" : lbl));
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0;
                };

                const item = { name: row.names[0].name, kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva") };
                mealData.push(item);

                container.innerHTML += `
                    <div class="food-card">
                        <span class="food-name">${item.name}</span>
                        <div class="input-wrapper">
                            <input type="number" id="q-${i}" value="0" oninput="calc()">
                            <span class="input-suffix">g</span>
                        </div>
                    </div>`;
            });
        } catch (e) { }
    }

    async function runAI() {
        if (!GEMINI_API_KEY) return;
        document.getElementById('splash').style.display = 'flex';

        let prompt = `Menu: ${JSON.stringify(mealData.map(m=>m.name))}. Arvioi annos grammoina. Sääntö: 1 kauha = 150g. Palauta JSON: {"menuResults": {"Nimi": g}, "extraItems": [{"name": "Nimi", "grams": 0, "kcal": 1, "p": 1, "r": 1, "h": 1}]}`;
        let body = { contents: [{ parts: [{ text: prompt + " Kuvaus: " + document.getElementById('ai-input').value }] }] };
        if (selectedImageData) body.contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: selectedImageData } });

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const d = await resp.json();
            const results = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
            
            mealData.forEach((item, i) => { document.getElementById(`q-${i}`).value = results.menuResults[item.name] || 0; });
            
            const extraContainer = document.getElementById('extra-food-list');
            if (results.extraItems) {
                results.extraItems.forEach(item => {
                    const id = extraData.length;
                    extraData.push(item);
                    extraContainer.innerHTML += `
                        <div class="food-card">
                            <span class="food-name">${item.name} (Muu)</span>
                            <div class="input-wrapper">
                                <input type="number" id="extra-q-${id}" value="${item.grams}" oninput="calc()">
                                <span class="input-suffix">g</span>
                            </div>
                        </div>`;
                });
            }
            calc();
        } catch (e) { }
        document.getElementById('splash').style.display = 'none';
    }

    function calc() {
        let tk=0, tp=0, th=0, tr=0;
        mealData.forEach((item, i) => {
            const w = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        extraData.forEach((item, i) => {
            const w = parseFloat(document.getElementById(`extra-q-${i}`).value) || 0;
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        document.getElementById('res-kcal').innerText = Math.round(tk);
        document.getElementById('res-p').innerText = Math.round(tp) + "g";
        document.getElementById('res-h').innerText = Math.round(th) + "g";
        document.getElementById('res-r').innerText = Math.round(tr) + "g";
    }

    const d = new Date();
    document.getElementById('date-label').innerText = d.toLocaleDateString('fi-FI', { weekday: 'long', day: 'numeric', month: 'long' });
    init();
</script>
</body>
</html>
