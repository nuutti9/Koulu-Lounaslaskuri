<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lounas</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1C1C1E; --card-sec: #2C2C2E; --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B; --text: #FFFFFF; --text-dim: #8E8E93;
            --font-main: "Manrope", sans-serif;
        }
        html, body { width: 100%; height: 100%; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; font-family: var(--font-main); overflow: hidden; }
        header { position: fixed; top: 0; left: 0; right: 0; z-index: 2000; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px); padding: 55px 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-content { max-width: 374px; margin: 0 auto; position: relative; }
        .date { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .sticky-stats { position: absolute; right: 0; bottom: 0; display: flex; gap: 12px; opacity: 0; transform: translateY(5px); transition: all 0.3s ease; }
        .sticky-stats.visible { opacity: 1; transform: translateY(0); }
        .scroll-area { height: 100vh; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding-top: 140px; }
        .container { width: 100%; max-width: 414px; padding: 0 20px 40px; margin: 0 auto; box-sizing: border-box; }
        .hero { background: linear-gradient(145deg, #1c1c1e, #131314); border-radius: 28px; padding: 35px 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .plate-circle { width: 140px; height: 140px; border-radius: 50%; border: 6px solid var(--card-sec); margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; }
        .kcal-val { font-size: 48px; font-weight: 800; }
        .macro-row { display: flex; justify-content: space-around; margin-top: 25px; padding-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); }
        .m-val { font-size: 19px; font-weight: 700; display: block; }
        .m-lbl { font-size: 9px; font-weight: 800; color: var(--text-dim); }
        .ai-zone { background: var(--card); border-radius: 22px; padding: 20px; margin-bottom: 25px; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 17px; outline: none; resize: none; min-height: 80px; }
        .btn-row { display: flex; gap: 12px; margin-top: 15px; }
        .btn-analyze { background: var(--accent); color: white; flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 15px; }
        .food-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; }
        .input-wrapper { position: relative; display: flex; align-items: center; background: #000; border-radius: 14px; }
        input[type="number"] { flex: 1; background: transparent; border: none; color: white; font-weight: 700; font-size: 24px; padding: 14px 45px 14px 18px; outline: none; }
        #splash { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 3000; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div id="splash"><div style="font-weight: 800; color: white; font-size: 20px;">ANALYSOIDAAN</div></div>
<header id="main-header">
    <div class="header-content">
        <div class="date" id="date-label">MUHOS SCHOOLS</div>
        <h1>Lounas</h1>
        <div class="sticky-stats" id="mini-stats">
            <div class="s-item"><span class="s-val" id="mini-kcal">0</span><span class="s-lbl">kcal</span></div>
            <div class="s-item"><span class="s-val" id="mini-p" style="color:var(--p)">0g</span><span class="s-lbl">P</span></div>
            <div class="s-item"><span class="s-val" id="mini-r" style="color:var(--f)">0g</span><span class="s-lbl">R</span></div>
            <div class="s-item"><span class="s-val" id="mini-h" style="color:var(--c)">0g</span><span class="s-lbl">H</span></div>
        </div>
    </div>
</header>
<div class="scroll-area" id="scroller">
    <div class="container">
        <div class="hero" id="hero-section">
            <div class="plate-circle"><div><span class="kcal-val" id="res-kcal">0</span><div style="color:var(--text-dim);font-size:14px;font-weight:700;">kcal</div></div></div>
            <div class="macro-row">
                <div class="m-box"><span class="m-lbl" style="color:var(--p)">PROTEIINI</span><span class="m-val" id="res-p">0g</span></div>
                <div class="m-box"><span class="m-lbl" style="color:var(--f)">RASVA</span><span class="m-val" id="res-r">0g</span></div>
                <div class="m-box"><span class="m-lbl" style="color:var(--c)">HIILIHYDRAATTI</span><span class="m-val" id="res-h">0g</span></div>
            </div>
        </div>
        <div class="ai-zone">
            <textarea id="ai-input" placeholder="Mitä söit tänään?"></textarea>
            <div class="btn-row"><button class="btn-analyze" onclick="runAI()">Analysoi</button></div>
        </div>
        <div id="food-list"></div>
    </div>
</div>
<script>
    const GEMINI_API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : "";
    let mealData = [];
    document.getElementById('scroller').addEventListener('scroll', (e) => {
        document.getElementById('mini-stats').classList.toggle('visible', e.target.scrollTop > 100);
    });
    async function init() {
        try {
            const r = await fetch('./menu.json');
            const data = await r.json();
            const rows = data[0].data.mealOptions[0].rows;
            const container = document.getElementById('food-list');
            rows.forEach((row, i) => {
                const factors = row.nutritiveItem.factors;
                const getVal = (lbl, isK) => {
                    const f = factors.find(fact => fact.nutritiveFactorNames[0].name === (isK ? "Energia" : lbl) && (!isK || fact.values[0].value100.includes("kcal")));
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0;
                };
                const item = { name: row.names[0].name, kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva") };
                mealData.push(item);
                container.innerHTML += `<div class="food-card"><span class="food-name">${item.name}</span><div class="input-wrapper"><input type="number" id="q-${i}" value="0" oninput="calc()"><span style="position:absolute;right:18px;color:var(--text-dim);font-weight:700;">g</span></div></div>`;
            });
        } catch (e) {}
    }
    async function runAI() {
        if (!GEMINI_API_KEY) return alert("AI-avain puuttuu palvelimelta.");
        document.getElementById('splash').style.display = 'flex';
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Menu: ${JSON.stringify(mealData.map(m=>m.name))}. Tunnista annos grammoina. Palauta vain JSON: {"menuResults": {"Ruoka": g}} Kuvaus: "${document.getElementById('ai-input').value}"` }] }] })
            });
            const d = await resp.json();
            const results = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
            mealData.forEach((item, i) => { document.getElementById(`q-${i}`).value = results.menuResults[item.name] || 0; });
            calc();
        } catch (e) { alert("AI Virhe: " + e.message); }
        document.getElementById('splash').style.display = 'none';
    }
    function calc() {
        let tk=0, tp=0, th=0, tr=0;
        mealData.forEach((item, i) => {
            const w = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        document.getElementById('res-kcal').innerText = Math.round(tk);
        document.getElementById('mini-kcal').innerText = Math.round(tk);
        document.getElementById('res-p').innerText = document.getElementById('mini-p').innerText = Math.round(tp) + "g";
        document.getElementById('res-r').innerText = document.getElementById('mini-r').innerText = Math.round(tr) + "g";
        document.getElementById('res-h').innerText = document.getElementById('mini-h').innerText = Math.round(th) + "g";
    }
    init();
</script>
</body>
</html>
