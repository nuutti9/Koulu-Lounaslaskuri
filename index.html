<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lounas Dashboard</title>
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1C1C1E; --card-sec: #2C2C2E; --accent: #0A84FF;
            --p: #FF453A; --f: #FFD60A; --c: #32D74B; --text: #FFFFFF; --text-dim: #8E8E93;
            --radius: 22px;
        }

        /* Ammattimainen lukitus: estää sivuttaisliikkeen puhelimella */
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0;
            -webkit-font-smoothing: antialiased;
            touch-action: pan-y; /* Sallii vain pystysuuntaisen skrollauksen */
        }

        .container { 
            width: 100%; 
            max-width: 414px; 
            padding: 20px; 
            margin: 0 auto; 
            box-sizing: border-box; 
        }

        header { margin: 40px 0 25px 5px; }
        .date { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        /* Hero-osio ja lautasympyrä */
        .hero {
            background: linear-gradient(145deg, #1c1c1e, #131314);
            border-radius: var(--radius); padding: 30px; margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            position: relative; overflow: hidden;
        }

        /* Se CSS-lautasympyrä takaisin */
        .plate-circle {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 8px solid var(--card-sec);
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .kcal-val { font-size: 48px; font-weight: 800; line-height: 1; display: block; }
        
        .macro-row { display: grid; grid-template-columns: 1fr 1fr 1fr; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--card-sec); }
        .m-box { display: flex; flex-direction: column; align-items: center; }
        .m-val { font-size: 17px; font-weight: 700; }

        .ai-zone { background: var(--card); border-radius: var(--radius); padding: 15px; margin-bottom: 25px; }
        textarea { 
            width: 100%; background: transparent; border: none; color: white; 
            font-size: 17px; outline: none; resize: none; padding: 10px; 
            box-sizing: border-box; min-height: 50px;
        }

        .image-preview { 
            display: none; width: 100%; height: 120px; object-fit: cover; 
            border-radius: 14px; margin-bottom: 12px; border: 1px solid var(--card-sec);
        }

        .btn-row { display: flex; gap: 10px; }
        .btn-upload { background: var(--card-sec); color: var(--accent); flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: 600; font-size: 15px; cursor: pointer; }
        .btn-analyze { background: var(--accent); color: white; flex: 2; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; }

        .food-card { background-color: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.02); }
        .food-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .food-g { font-size: 13px; font-weight: 700; color: var(--accent); background: rgba(10, 132, 255, 0.1); padding: 4px 10px; border-radius: 8px; }
        
        .controls { display: flex; gap: 10px; }
        input[type="number"] { flex: 1; background: #000; border: none; padding: 12px; border-radius: 10px; color: white; text-align: center; font-weight: 700; font-size: 18px; outline: none; }
        select { flex: 1.5; background: #000; border: none; padding: 12px; border-radius: 10px; color: var(--accent); font-weight: 700; appearance: none; text-align: center; outline: none; }

        #splash { position: fixed; inset: 0; background: black; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.5s; pointer-events: none; opacity:0; display:none; }
    </style>
</head>
<body>

<div id="splash"><div id="splash-text" style="font-weight: 800; color: white; letter-spacing: 1px;">ANALYSOIDAAN</div></div>

<div class="container">
    <header>
        <div class="date" id="date-label">MUHOS SCHOOLS</div>
        <h1>Lounas</h1>
    </header>

    <div class="hero">
        <div class="plate-circle">
            <div>
                <span class="kcal-val" id="res-kcal">0</span>
                <div style="color: var(--text-dim); font-size: 12px; font-weight: 600;">kcal</div>
            </div>
        </div>
        <div class="macro-row">
            <div class="m-box"><span style="color:var(--p); font-size:11px;">PROT</span><span class="m-val" id="res-p">0g</span></div>
            <div class="m-box"><span style="color:var(--f); font-size:11px;">FAT</span><span class="m-val" id="res-r">0g</span></div>
            <div class="m-box"><span style="color:var(--c); font-size:11px;">CARB</span><span class="m-val" id="res-h">0g</span></div>
        </div>
    </div>

    <div class="ai-zone">
        <img id="preview" class="image-preview">
        <textarea id="ai-input" placeholder="Kirjoita kuvaus annoksesta tai valitse kuva"></textarea>
        <div class="btn-row">
            <button class="btn-upload" onclick="document.getElementById('camera-input').click()">Valitse kuva</button>
            <button class="btn-analyze" onclick="runAI()">Analysoi</button>
        </div>
        <input type="file" id="camera-input" accept="image/*" style="display:none" onchange="handleFile(this)">
    </div>

    <div id="food-list"></div>
</div>

<script>
    const GEMINI_API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : "";
    let mealData = [];
    let selectedImageData = null;
    const UNITS = { "kauha": 150, "dl": 100, "kpl": 60, "g": 1 };

    function handleFile(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                selectedImageData = e.target.result.split(',')[1];
            };
            reader.readAsDataURL(file);
        }
    }

    async function init() {
        try {
            const r = await fetch('./menu.json');
            const data = await r.json();
            const rows = data[0].data.mealOptions[0].rows;
            const container = document.getElementById('food-list');

            rows.forEach((row, i) => {
                const factors = row.nutritiveItem.factors;
                const getVal = (lbl, isK) => {
                    const f = factors.find(fact => fact.nutritiveFactorNames[0].name === (isK ? "Energia" : lbl) && (!isK || fact.values[0].value100.includes("kcal")));
                    return f ? parseFloat(f.values[0].value100.replace(',','.').replace(/[^\d.]/g, '')) : 0;
                };

                const item = {
                    name: row.names[0].name,
                    kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva"),
                    density: 100
                };
                mealData.push(item);

                container.innerHTML += `
                    <div class="food-card">
                        <div class="food-header"><span style="font-weight:700;">${item.name}</span><span class="food-g" id="w-${i}">0 g</span></div>
                        <div class="controls">
                            <input type="number" id="q-${i}" value="0" oninput="calc()">
                            <select id="u-${i}" onchange="calc()">
                                <option value="g">Gramma</option>
                                <option value="kauha">Kauha</option>
                                <option value="dl">Desi</option>
                            </select>
                        </div>
                    </div>`;
            });
        } catch (e) { console.error("Menu load failed"); }
    }

    async function runAI() {
        if (!GEMINI_API_KEY) return alert("API-avain puuttuu.");
        const textInput = document.getElementById('ai-input').value;
        if (!textInput && !selectedImageData) return alert("Lisää teksti tai kuva.");

        const loader = document.getElementById('splash');
        loader.style.display = 'flex'; loader.style.opacity = '1';

        let prompt = `Tässä on päivän menu: ${JSON.stringify(mealData.map(m=>m.name))}.
        Tehtävä: Tunnista mistä näistä ruoista on kyse ja arvioi niiden määrä grammoina.
        Yksi kauha keittoa on 150g. Palauta vain JSON: {"RuokaNimi": grammamäärä}.`;

        let body = { contents: [{ parts: [{ text: prompt }] }] };
        if (selectedImageData) body.contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: selectedImageData } });
        if (textInput) body.contents[0].parts[0].text += ` Käyttäjän kuvaus: "${textInput}"`;

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const d = await resp.json();
            const results = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
            
            mealData.forEach((item, i) => {
                document.getElementById(`q-${i}`).value = results[item.name] || 0;
                document.getElementById(`u-${i}`).value = "g";
            });
            calc();
        } catch (e) { alert("Analyysi epäonnistui."); }
        
        loader.style.opacity = '0'; 
        setTimeout(() => { 
            loader.style.display = 'none';
            document.getElementById('preview').style.display = 'none';
            selectedImageData = null;
        }, 500);
    }

    function calc() {
        let tk=0, tp=0, th=0, tr=0;
        mealData.forEach((item, i) => {
            const q = parseFloat(document.getElementById(`q-${i}`).value) || 0;
            const u = document.getElementById(`u-${i}`).value;
            let w = q * (UNITS[u] || 1);
            document.getElementById(`w-${i}`).innerText = Math.round(w) + " g";
            tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
        });
        document.getElementById('res-kcal').innerText = Math.round(tk);
        document.getElementById('res-p').innerText = Math.round(tp) + "g";
        document.getElementById('res-h').innerText = Math.round(th) + "g";
        document.getElementById('res-r').innerText = Math.round(tr) + "g";
    }

    const d = new Date();
    document.getElementById('date-label').innerText = d.toLocaleDateString('fi-FI', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
    init();
</script>
</body>
</html>
