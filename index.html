<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KR TRACKER</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KR TRACKER">
    <link rel="apple-touch-icon" href="./kr-logo.png">
    <link rel="icon" href="./kr-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="./config.js"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #1C1C1E;
            --card-sec: #2C2C2E;
            --accent: #0A84FF;
            --p: #FF453A;
            --f: #FFD60A;
            --c: #32D74B;
            --text: #FFFFFF;
            --text-dim: #8E8E93;
            --font-main: "Manrope", sans-serif;
            --blur: saturate(180%) blur(20px);
        }

        html, body {
            width: 100%; height: 100%;
            background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; font-family: var(--font-main);
            overflow: hidden; position: fixed;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 2000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 55px 24px 16px;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header.scrolled { padding-top: 50px; padding-bottom: 12px; }

        .header-content { max-width: 400px; margin: 0 auto; position: relative; }

        .date {
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 34px; font-weight: 800; margin: 2px 0 0;
            letter-spacing: -1px; transition: all 0.3s ease;
        }

        header.scrolled .date, header.scrolled h1 {
            opacity: 0; transform: translateY(-8px) scale(0.95); pointer-events: none;
        }

        /* --- STICKY STATS (PILL STYLE) --- */
        .sticky-stats {
            position: absolute; bottom: 0; left: 50%;
            transform: translate(-50%, 10px);
            display: flex; gap: 16px; opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(44, 44, 46, 0.8);
            padding: 8px 20px; border-radius: 40px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }

        header.scrolled .sticky-stats { opacity: 1; transform: translate(-50%, -4px); }

        .s-item { display: flex; align-items: baseline; gap: 4px; }
        .s-val { font-size: 15px; font-weight: 700; }
        .s-lbl { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }

        /* --- SCROLL AREA --- */
        .scroll-area {
            height: 100vh; overflow-y: scroll; overflow-x: hidden;
            -webkit-overflow-scrolling: touch; padding-top: 150px;
        }

        .container { width: 100%; max-width: 414px; padding: 0 20px 250px; margin: 0 auto; box-sizing: border-box; }

        /* --- HERO CARD --- */
        .hero {
            background: var(--card); border-radius: 32px;
            padding: 40px 24px; margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 0.5px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .plate-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at center, #2c2c2e 0%, #1c1c1e 100%);
            border: 8px solid #2c2c2e; margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .kcal-val { font-size: 52px; font-weight: 800; letter-spacing: -2px; }

        .macro-row {
            display: flex; justify-content: space-between;
            margin-top: 24px; padding-top: 24px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .m-val { font-size: 20px; font-weight: 700; display: block; margin-bottom: 2px; }
        .m-lbl { font-size: 10px; font-weight: 700; color: var(--text-dim); letter-spacing: 0.5px; }

        /* --- AI ZONE --- */
        .ai-zone {
            background: var(--card); border-radius: 28px;
            padding: 24px; margin-bottom: 24px;
            border: 0.5px solid rgba(255,255,255,0.08);
        }

        textarea {
            width: 100%; background: transparent; border: none; color: white;
            font-size: 18px; font-weight: 500; outline: none; resize: none;
            min-height: 90px; font-family: inherit; line-height: 1.4;
        }

        .btn-row { display: flex; gap: 12px; margin-top: 20px; }

        .btn-analyze {
            background: var(--accent);
            color: white; flex: 1; padding: 18px;
            border-radius: 18px; border: none;
            font-weight: 700; font-size: 17px;
            box-shadow: 0 8px 20px rgba(10, 132, 255, 0.3);
            transition: all 0.2s ease;
        }

        .btn-analyze:active { transform: scale(0.97); opacity: 0.9; }

        .btn-camera {
            background: var(--card-sec); color: var(--accent);
            width: 60px; height: 60px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            border-radius: 18px; border: none; transition: all 0.2s ease;
        }
        
        .btn-camera svg { width: 26px; height: 26px; }

        /* --- FOOD CARDS --- */
        .food-card {
            background: var(--card); border-radius: 24px;
            padding: 20px 24px; margin-bottom: 12px;
            border: 0.5px solid rgba(255,255,255,0.05);
        }

        .food-name { font-size: 17px; font-weight: 600; display: block; margin-bottom: 16px; color: #f2f2f7; }

        .input-wrapper {
            position: relative; display: flex; align-items: center;
            background: rgba(0,0,0,0.3); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: border 0.3s ease;
        }

        .input-wrapper:focus-within { border-color: var(--accent); }

        input[type="number"] {
            flex: 1; background: transparent; border: none; color: white;
            font-weight: 700; font-size: 26px; padding: 16px 50px 16px 20px;
            outline: none; -webkit-appearance: none;
        }

        .input-unit { position: absolute; right: 20px; font-weight: 700; color: var(--text-dim); font-size: 18px; }

        /* --- SPLASH & LOADER --- */
        #splash {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--blur); z-index: 3000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; gap: 24px;
        }

        .loader {
            width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1);
            border-radius: 50%; border-bottom-color: var(--accent);
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>
    <div id="splash">
        <span class="loader"></span>
        <div style="font-weight: 700; color: white; font-size: 20px; letter-spacing: -0.5px;">Analysoidaan...</div>
    </div>

    <header id="main-header">
        <div class="header-content">
            <div class="date" id="date-label">Lataus...</div>
            <h1 id="main-title">Lounas</h1>
            <div class="sticky-stats" id="mini-stats">
                <div class="s-item"><span class="s-val" id="mini-kcal">0</span> <span class="s-lbl">kcal</span></div>
                <div class="s-item"><span class="s-val" id="mini-p" style="color:var(--p)">0g</span> <span class="s-lbl">P</span></div>
                <div class="s-item"><span class="s-val" id="mini-r" style="color:var(--f)">0g</span> <span class="s-lbl">R</span></div>
                <div class="s-item"><span class="s-val" id="mini-h" style="color:var(--c)">0g</span> <span class="s-lbl">H</span></div>
            </div>
        </div>
    </header>

    <div class="scroll-area" id="scroller">
        <div class="container">
            <div class="hero">
                <div class="plate-circle">
                    <div>
                        <span class="kcal-val" id="res-kcal">0</span>
                        <div style="color:var(--text-dim);font-size:15px;font-weight:700; margin-top: -5px;">KCAL</div>
                    </div>
                </div>
                <div class="macro-row">
                    <div class="m-box"><span class="m-lbl" style="color:var(--p)">PROTEIINI</span><span class="m-val" id="res-p">0g</span></div>
                    <div class="m-box"><span class="m-lbl" style="color:var(--f)">RASVA</span><span class="m-val" id="res-r">0g</span></div>
                    <div class="m-box"><span class="m-lbl" style="color:var(--c)">HIILIHYDRAATTI</span><span class="m-val" id="res-h">0g</span></div>
                </div>
            </div>

            <div class="ai-zone">
                <textarea id="ai-input" placeholder="Mitä söit tänään?"></textarea>
                <img id="img-preview" style="width:100%; max-height:200px; object-fit:cover; border-radius:20px; margin-top:15px; display:none; border: 0.5px solid rgba(255,255,255,0.1);" />
                <div class="btn-row">
                    <input type="file" id="image-upload" accept="image/*" style="display:none;" onchange="previewImage(event)">
                    <button class="btn-camera" onclick="document.getElementById('image-upload').click()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                    </button>
                    <button class="btn-analyze" onclick="runAI()">Analysoi annos</button>
                </div>
            </div>

            <div id="food-list"></div>
        </div>
    </div>

    <script>
        // --- AI & TOIMINNALLISUUS (Pidetty ennallaan) ---
        const GEMINI_API_KEY = typeof CONFIG !== 'undefined' ? CONFIG.API_KEY : "";
        let mealData = [];
        let uploadedImageData = null;

        const uDate = new Date();
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date-label').innerText = uDate.toLocaleDateString('fi-FI', options).toUpperCase();

        document.getElementById('scroller').addEventListener('scroll', (e) => {
            const isScrolled = e.target.scrollTop > 80;
            document.getElementById('main-header').classList.toggle('scrolled', isScrolled);
        });

        function previewImage(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                uploadedImageData = ev.target.result;
                const img = document.getElementById('img-preview');
                img.src = uploadedImageData;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        async function init() {
            try {
                const r = await fetch('./menu.json');
                const data = await r.json();
                const rows = data[0].data.mealOptions[0].rows;
                const container = document.getElementById('food-list');
                rows.forEach((row, i) => {
                    const factors = row.nutritiveItem.factors;
                    const getVal = (lbl, isK) => {
                        const f = factors.find(fact => fact.nutritiveFactorNames[0].name === (isK ? "Energia" : lbl) && (!isK || fact.values[0].value100.includes("kcal")));
                        return f ? parseFloat(f.values[0].value100.replace(',', '.').replace(/[^\d.]/g, '')) : 0;
                    };
                    const item = { name: row.names[0].name, kcal: getVal("Energia", true), p: getVal("Proteiini"), h: getVal("Hiilihydraatit"), r: getVal("Rasva") };
                    mealData.push(item);
                    container.innerHTML += `
                        <div class="food-card">
                            <span class="food-name">${item.name}</span>
                            <div class="input-wrapper">
                                <input type="number" id="q-${i}" value="0" oninput="calc()" inputmode="decimal">
                                <span class="input-unit">g</span>
                            </div>
                        </div>`;
                });
            } catch (e) { }
        }

        async function runAI() {
            if (!GEMINI_API_KEY) return alert("AI-avain puuttuu.");
            document.getElementById('splash').style.display = 'flex';
            try {
                const promptString = `Olet ruoan painon arvioija. Valikko: ${JSON.stringify(mealData.map(m => m.name))}. Kuvaus: "${document.getElementById('ai-input').value}". Palauta VAIN JSON muodossa: {"menuResults": {"Ruoka": grammaa}}`;
                const parts = [{ text: promptString }];
                if (uploadedImageData) {
                    parts.push({ inlineData: { data: uploadedImageData.split(',')[1], mimeType: uploadedImageData.match(/data:(.*?);/)[1] } });
                }
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });
                const d = await resp.json();
                const results = JSON.parse(d.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim());
                mealData.forEach((item, i) => { document.getElementById(`q-${i}`).value = results.menuResults[item.name] || 0; });
                calc();
            } catch (e) { alert("AI Virhe: " + e.message); }
            document.getElementById('splash').style.display = 'none';
        }

        function calc() {
            let tk = 0, tp = 0, th = 0, tr = 0;
            mealData.forEach((item, i) => {
                const w = parseFloat(document.getElementById(`q-${i}`).value) || 0;
                tk += (w * item.kcal) / 100; tp += (w * item.p) / 100; th += (w * item.h) / 100; tr += (w * item.r) / 100;
            });
            const r = Math.round;
            document.getElementById('res-kcal').innerText = r(tk);
            document.getElementById('mini-kcal').innerText = r(tk);
            document.getElementById('res-p').innerText = document.getElementById('mini-p').innerText = r(tp) + "g";
            document.getElementById('res-r').innerText = document.getElementById('mini-r').innerText = r(tr) + "g";
            document.getElementById('res-h').innerText = document.getElementById('mini-h').innerText = r(th) + "g";
        }
        init();
    </script>
</body>
</html>
